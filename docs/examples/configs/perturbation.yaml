# In silico perturbation config (IL1B knockout example).
#
# IMPORTANT — source/reference state:
# This example knocks out IL1B (ENSG00000125538) with perturbation_sequence: "src",
# i.e. the gene is removed from the SOURCE state before predicting downstream
# time points. A knockout only has an effect if the gene is actually expressed in
# the source: cells in which the perturbed gene token is absent from the source
# sequence are filtered out, and batches with no such cells are skipped entirely
# (see Perturb/trainer.py:test_step).
#
# IL1B is induced by LPS and is ~0 in the unstimulated ("normal") baseline, so a
# "normal" source produces no cells to perturb and nearly all batches are skipped.
# This is why the source here is the 90-minute LPS state (90m_LPS), matching the
# manuscript. To reproduce this, tokenize the LPS data (notebook 02) with
# REFERENCE_TIME = "90m_LPS" and DATASET_NAME = "lps_90min_perturb" so the source
# files below (90m_LPS.dataset / 90m_LPS.h5ad) exist.
data:
  src_dataset_file: "T_perturb/tokenized_data/lps_90min_perturb/dataset_2000_hvg_src/90m_LPS.dataset" # 90-minute LPS SOURCE state (IL1B is expressed here)
  tgt_dataset_folder: "T_perturb/tokenized_data/lps_90min_perturb/dataset_2000_hvg_tgt" # downstream target time points (6h, 10h)
  src_adata: "T_perturb/tokenized_data/lps_90min_perturb/h5ad_pairing_2000_hvg_src/90m_LPS.h5ad" # source adata (90m_LPS)
  tgt_adata_folder: "T_perturb/tokenized_data/lps_90min_perturb/h5ad_pairing_2000_hvg_tgt" # target adata folder
  # cond_list:
  #   - "cell_type_harmonized"  # list of condition columns used during training

trainer:
  use_count_decoder: true # whether to use the count decoder
  n_samples: 3 # number of samples to generate per input during inference
  d_model: 768 # dimension of the model
  generate: false # whether to generate perturbations
  use_positional_encoding: false # whether to use positional encoding
  dropout: 0 # dropout rate for prediction
  num_heads: 8 # number of attention heads
  num_layers: 6 # number of transformer layers
  loss_mode: "zinb" # loss function mode: "mse", "nb", "zinb"
  d_ff: 32 # dimension of the feedforward network
  # tgt_vocab_size and max_seq_length are intentionally omitted: when both are
  # absent, val.py computes them per-dataset from the actual tokenized data
  # (scanning all target datasets and the source). This is robust to changing
  # datasets and matches the manuscript's 90min config. Set them explicitly only
  # if you need to override the derived values.
  mask_scheduler: "pow" # masking scheduler type
  output_dir: "T_perturb/res/perturbation" # output directory for results
  mapping_dict_path: "T_perturb/tokenized_data/lps_90min_perturb/token_id_to_genename_2000_hvg.pkl" # mapping dictionary from the 90min tokenization step
  tokenid_to_rowid_path: "T_perturb/tokenized_data/lps_90min_perturb/tokenid_to_rowid_2000_hvg.pkl" # tokenid to rowid mapping from the 90min tokenization step
  encoder: "scmaskgit" # encoder type (Pretrain model)
  encoder_path: "Perturbgen/pretraining_cohort/20250709_1223_cellgen_train_masking_lr_5e-05_wd_1e-06_batch_64_ptime_pos_sin_m_pow_tp_1-2-3_s_42-epoch=00.ckpt" # path to pretrained encoder weights
  context_mode: false # whether to use context mode, True is recommeneded for perturbation prediction of data with multiple time points
  temperature: 1.5 # temperature for generation
  iterations: 19 # number of generation iterations
  pos_encoding_mode: "time_pos_sin" # positional encoding mode
  exclude_src: false # whether to exclude source data during inference
  perturbation_mode: "mask" # perturbation mode: "mask"
  genes_to_perturb:
    - "ENSG00000125538" # IL1B — must be expressed in the source state to have an effect
  validation_mode: "inference" # validation mode: "inference"
  perturbation_sequence:
    - "src" # perturbation applied to the source (90m_LPS) state, then propagated downstream
  var_list: # list of data.var retained during tokenization
    - "cell_type_harmonized"
    - "cell_pairing_index"
    - "time_after_LPS"
  pred_tps: # time points to predict
    - 1
    - 2


datamodule:
  batch_size: 64 # batch size for training
  num_workers: 8 # number of workers for data loading
  shuffle: false # whether to shuffle the data
  split: false # whether to split the data
  # max_len is omitted on purpose: val.py sets it from the derived max sequence
  # length of the actual dataset (see the note in the trainer block above).
  var_list: # list of data.var retained during tokenization, same as in trainer
    - "cell_type_harmonized"
    - "time_after_LPS"
    - "cell_pairing_index"
  pred_tps: # time points to predict/ perturb, same as in trainer
    - 1
    - 2

model:
  precision: 16 # precision for training
  ckpt_masking_path: "path/to/count_decoder_checkpoint.ckpt" # path to count decoder checkpoint from previous count decoder training step (notebook 3)
