trainer:
  d_model: 768
  num_heads: 8
  num_layers: 6
  d_ff: 64
  dropout: 0
  mask_scheduler: 'pow'
  output_dir: 'T_perturb/res/lps/perturbation'
  mapping_dict_path: 'T_perturb/tokenized_data/lps_90min_perturb/token_id_to_genename_2000_hvg.pkl'
  tokenid_to_rowid_path: 'T_perturb/tokenized_data/lps_90min_perturb/tokenid_to_rowid_2000_hvg.pkl'
  encoder: 'scmaskgit'
  encoder_path: '/lustre/scratch126/cellgen/lotfollahi/av13/scmaskgit/foundation_107m/checkpoints/20250709_1223_cellgen_train_masking_lr_5e-05_wd_1e-06_batch_64_ptime_pos_sin_m_pow_tp_1-2-3_s_42-epoch=00.ckpt'
  context_mode: False
  pos_encoding_mode: 'time_pos_sin'
  perturbation_mode: 'mask'
  genes_to_perturb:
    - 'ENSG00000125538'
  validation_mode: 'inference'
  perturbation_sequence:
    - 'src'
  var_list:
    - 'cell_type_harmonized'
    - 'cell_pairing_index'
    - 'time_after_LPS'
  pred_tps:
    - 1
    - 2
  #count decoder
  use_count_decoder: True
  loss_mode: 'zinb'
  n_samples: 2

datamodule:
  batch_size: 64
  num_workers: 4
  shuffle: False
  split: False
  var_list:
    - 'cell_type_harmonized'
    - 'cell_pairing_index'
    - 'time_after_LPS'
  pred_tps:
    - 1
    - 2
model:
  precision: 16
  ckpt_masking_path: "/lustre/scratch126/cellgen/lotfollahi/kl11/T_perturb/res/lps/all_tps/checkpoints/20251211_0217_cellgen_train_count_lr_0.001_wd_0.0001_batch_64_drop_0.1_zinb_tp_1-2_s_100_pos_time_pos_sin_m_pow-epoch=01.ckpt"
