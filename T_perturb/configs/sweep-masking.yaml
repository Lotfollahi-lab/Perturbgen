# masking attention
method: grid
metric:
  goal: minimize
  name: val/perplexity_epoch
name: tune_masking
parameters:
  train_mode:
    value: 'masking'
  split:
    value: True
  generate:
    value: False
  splitting_mode:
    value: stratified
  epochs:
   value: 20
  output_dir:
    value: './T_perturb/T_perturb/plt/res/cytoimmgen'
  src_dataset:
    value: './T_perturb/T_perturb/pp/res/cytoimmgen/dataset_hvg_src/0h.dataset'
